name: publish

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # GitHub release + asset upload
      id-token: write     # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver=$(uv run --no-project python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$ver" ]; then
            echo "tag v$tag does not match pyproject version $ver" >&2
            exit 1
          fi

      - run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing automatic

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
