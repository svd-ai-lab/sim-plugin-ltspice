name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to create the GitHub release + upload assets
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver=$(uv run --no-project python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$ver" ]; then
            echo "tag v$tag does not match pyproject version $ver" >&2
            exit 1
          fi

      - run: uv build

      # Distribution is GitHub-only (no PyPI). The wheel + sdist are uploaded
      # as release assets and referenced from sim-plugin-index → latest_wheel_url
      # so `sim plugin install ltspice` can pip-install the wheel directly.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
