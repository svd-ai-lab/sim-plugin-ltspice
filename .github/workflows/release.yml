name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required for PyPI trusted-publisher OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver=$(uv run --no-project python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$ver" ]; then
            echo "tag v$tag does not match pyproject version $ver" >&2
            exit 1
          fi

      - run: uv build

      # NOTE: PyPI trusted-publisher binding for `sim-plugin-ltspice` must
      # be pre-bound to this repo before the first tag release. See
      # `dev-docs/runtime/plugin_extraction_status.md` and the PR that
      # introduced this workflow for the binding checklist.
      - uses: pypa/gh-action-pypi-publish@release/v1
